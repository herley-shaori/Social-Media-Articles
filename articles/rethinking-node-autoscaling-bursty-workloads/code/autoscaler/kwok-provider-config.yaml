apiVersion: v1
kind: ConfigMap
metadata:
  name: kwok-provider-config
  namespace: kube-system
data:
  config: |-
    apiVersion: v1alpha1
    # Read node templates from the kwok-provider-templates ConfigMap (static templates).
    readNodesFrom: configmap
    nodegroups:
      # Group template nodes into a nodegroup by the value of this label.
      fromNodeLabelKey: "kwok-nodegroup"
    nodes:
      # Do not taint the fake nodes, so burst/headroom pods schedule without tolerations.
      skipTaint: true
    configmap:
      name: kwok-provider-templates
    # KWOK is already installed in-cluster; do not let the provider install it again.
    kwok:
      install: false
